<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mole Smash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="controls">
        <h1>Mole Smash</h1>
        <h2>Score: <span id="scoreBoard">0</span></h2>
        <h2>Time: <span id="time">10</span>s</h2>
        <button id="startBtn" onclick="startGame()">Start Game</button>
    </div>

    <div class="grid">
        <div class="hole" id="hole1">
            <button class="mole" onclick="smash()">0--0</button>
        </div>
        <div class="hole" id="hole2">
            <button class="mole" onclick="smash()">0--0</button>
        </div>
        <div class="hole" id="hole3">
            <button class="mole" onclick="smash()">0--0</button>
        </div>
        <div class="hole" id="hole4">
            <button class="mole" onclick="smash()">0--0</button>
        </div>
        <div class="hole" id="hole5">
            <button class="mole" onclick="smash()">0--0</button>
        </div>
        <div class="hole" id="hole6">
            <button class="mole" onclick="smash()">0--0</button>
        </div>
        <div class="hole" id="hole7">
            <button class="mole" onclick="smash()">0--0</button>
        </div>
        <div class="hole" id="hole8">
            <button class="mole" onclick="smash()">0--0</button>
        </div>
        <div class="hole" id="hole9">
            <button class="mole" onclick="smash()">0--0</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
